<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <link rel="stylesheet" href="../../Css/fonts.css">
  <link href="/style.css" rel="stylesheet" type="text/css" media="all">
  <style>
    body {
      margin: 0;
      background: rgb(8, 1, 31);
      color: white;
      font-family: 'Playfair Display', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 60px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5), 0 0 25px rgb(82, 66, 91), 0 0 5px rgb(11, 7, 255) ;
    }

    p {
      opacity: 0.7;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5), 0 0 25px rgb(82, 66, 91), 0 0 5px rgb(11, 7, 255) ;
    }

    a {
      color: rgb(255, 252, 198);
      text-decoration: none;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5), 0 0 25px rgb(255, 251, 0), 0 0 5px rgb(255, 162, 0) ;
    }
    a:hover {
      color: rgb(255, 255, 255);
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Your request led to nothingness—there was nothing here but an empty, tightly closed cage.</p>
    <p><a href="/index.html">← Back</a></p>
  </div>
</body>
</html>
